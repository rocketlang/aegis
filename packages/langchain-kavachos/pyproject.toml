[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langchain-kavachos"
version = "1.0.0"
description = "KavachOS DAN gate callback for LangChain agents — pre-execution governance via AEGIS"
readme = "README.md"
license = { text = "AGPL-3.0" }
authors = [{ name = "Capt. Anil Sharma", email = "capt.anil.sharma@powerpbox.org" }]
keywords = ["langchain", "kavachos", "xshieldai", "ai-governance", "agent-safety"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU Affero General Public License v3",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
langchain = ["langchain-core>=0.1.0"]
dev = ["pytest>=7", "langchain-core>=0.1.0"]

[project.urls]
Homepage = "https://kavachos.xshieldai.com"
Repository = "https://github.com/rocketlang/aegis/tree/main/packages/langchain-kavachos"
Documentation = "https://kavachos.xshieldai.com/docs/langchain"

[tool.setuptools.packages.find]
where = ["."]
include = ["langchain_kavachos*"]
