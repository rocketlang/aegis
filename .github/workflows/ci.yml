name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test src/

      - name: Run agent governance scenarios (AEGIS on AEGIS)
        run: bun src/test-agents/runner.ts
        env:
          HOME: /tmp/aegis-ci-home

      - name: Build CLI
        run: bun build src/cli/index.ts --target=bun --outdir=dist/
